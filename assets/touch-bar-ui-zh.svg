  <g filter="url(#sketch)">
    <text x="104" y="104" class="hand" fill="#1F2933" font-size="46" font-weight="700">Codex Quota Widget</text>
    <text x="108" y="145" class="hand" fill="#5C6470" font-size="24">一个给额度焦虑用户用的小仪表盘。</text>
    <text x="108" y="180" class="hand" fill="#5C6470" font-size="24">把 5h 和 7D 剩余额度放到眼前，不挤菜单栏。</text>
  </g>

