    <text x="104" y="548" class="hand" fill="#1F2933" font-size="30" font-weight="700">在焦虑之前，一眼看见额度。</text>
    <text x="104" y="588" class="hand" fill="#5C6470" font-size="24">不挤菜单栏，也不用点进设置里找。</text>
    <text x="104" y="630" class="hand" fill="#5C6470" font-size="24">适合想保持创作流，又想知道额度余量的人。</text>
