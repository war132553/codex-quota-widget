<svg width="1440" height="700" viewBox="0 0 1440 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Quota Widget 中文手绘 UI mockup</title>
  <desc id="desc">Codex 额度小工具在 Touch Bar 上的手绘风中文界面图。</desc>
  <defs>
    <filter id="sketch" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="10" flood-color="#2D2A24" flood-opacity="0.18"/>
    </filter>
    <style>
      .hand {
        font-family: Virgil, "Comic Sans MS", "Bradley Hand", "PingFang SC", "Hiragino Sans GB", cursive;
      }
      .stroke {
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

